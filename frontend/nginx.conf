server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api requests to the backend container.
    # The service name "backend" resolves via Docker Compose DNS.
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Server-Sent Events (SSE) require buffering to be disabled so events
        # are forwarded to the browser immediately rather than batched.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # SPA fallback — serve index.html for any path that isn't a static asset
    # so React Router handles client-side routing correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
